<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KB Tracker — Sign In</title>
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #151820;
        --border: #2a2d38;
        --accent: #ffe81f;
        --text: #e8eaf0;
        --muted: #7a7e90;
        --font: 'Segoe UI', system-ui, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px 40px;
        text-align: center;
        max-width: 340px;
        width: 100%;
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      p.sub {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 28px;
        line-height: 1.5;
      }

      button#signin-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 10px 16px;
        background: #fff;
        color: #202124;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button#signin-btn:hover { opacity: 0.9; }
      button#signin-btn:disabled { opacity: 0.5; cursor: default; }

      button#signin-btn svg {
        flex-shrink: 0;
      }

      #status {
        margin-top: 18px;
        font-size: 12px;
        color: var(--muted);
        min-height: 18px;
      }
      #status.error { color: #e05252; }
      #status.success { color: #4caf68; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>⚡ KB Tracker</h1>
      <p class="sub">Sign in with your Google account to sync your game data across devices.</p>

      <button id="signin-btn">
        <!-- Google "G" SVG logo -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20" height="20">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.86l6.1-6.1C34.46 3.11 29.52 1 24 1 14.82 1 7.07 6.49 3.64 14.23l7.1 5.52C12.45 13.67 17.77 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.74H24v8.98h12.42c-.54 2.9-2.18 5.36-4.64 7.02l7.14 5.55C43.19 37.25 46.1 31.32 46.1 24.5z"/>
          <path fill="#FBBC05" d="M10.74 28.25a14.54 14.54 0 0 1 0-8.5l-7.1-5.52A23.94 23.94 0 0 0 0 24c0 3.86.92 7.5 2.64 10.77l8.1-6.52z"/>
          <path fill="#34A853" d="M24 47c5.52 0 10.16-1.83 13.54-4.95l-7.14-5.55C28.6 38.45 26.41 39.5 24 39.5c-6.23 0-11.55-4.17-13.26-9.75l-8.1 6.52C6.07 44.51 14.42 47 24 47z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Sign in with Google
      </button>

      <div id="status"></div>
    </div>
    <script type="module" src="./auth.ts"></script>
  </body>
</html>
